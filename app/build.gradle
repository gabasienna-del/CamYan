plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace "com.gaba.eskukap"

    defaultConfig {
        applicationId "com.gaba.eskukap"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        buildConfig true
        viewBinding true
    }

    packagingOptions {
        exclude 'META-INF/*'
    }
}

dependencies {
    implementation files('libs/api-82.jar')
    compileOnly files('libs/xposed-api.jar')   // <<< важно! не встраиваем внутрь APK
}
