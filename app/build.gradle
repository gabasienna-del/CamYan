plugins {
    id 'com.android.application'
}

android {
    compileSdk 34

    defaultConfig {
        applicationId "com.gaba.eskukap"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
        buildConfigField "String", "FAKE_PROVIDER", "\"fakephoto\""
    }

    buildFeatures {
        buildConfig true     // <<< ВАЖНО
        viewBinding true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    namespace 'com.gaba.eskukap'
}

dependencies {
    implementation files('libs/api-82.jar')
}
